services:
  db:
    image: mongo:latest
    container_name: mongodb_container
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db          # ✅ Volume nomeado → dados persistem
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - escola_network

  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=db
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=Luann
      - ME_CONFIG_BASICAUTH_PASSWORD=1234
    depends_on:
      db:
        condition: service_healthy
    networks:
      - escola_network

  redis:
    image: redis:alpine
    container_name: redis_container
    restart: always
    ports:
      - "6379:6379"
    # ✅ Sem volumes → Redis efêmero (cache zerado se o container cair)
    networks:
      - escola_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: fastapi_app
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://db:27017/escola
      - DATABASE_NAME=escola
      - REDIS_URL=redis://redis:6379    # ✅ CORREÇÃO 1: variável que cursos.py já lê
    depends_on:
      db:
        condition: service_healthy
      redis:                            # ✅ CORREÇÃO 2: app só sobe após Redis saudável
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - escola_network

volumes:
  mongodb_data:                        # ✅ Volume nomeado declarado aqui

networks:
  escola_network:
    driver: bridge