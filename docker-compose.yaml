services:
  db:
    image: mongo:latest
    container_name: mongodb_container
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - escola_network

  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express_container
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=db
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_MONGODB_ADMINUSERNAME=dani
      - ME_CONFIG_MONGODB_ADMINPASSWORD=123
    depends_on:
      db:
        condition: service_healthy
    networks:
      - escola_network
  app:
    build: .
    container_name: fastapi_app
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://db:27017/escola
      - DATABASE_NAME=escola
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - escola_network

volumes:
  mongodb_data:

networks:
  escola_network:
    driver: bridge
  
  

